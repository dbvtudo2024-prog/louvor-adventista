<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Louvor Adventista</title>
    <link rel="icon" type="image/png" href="https://xdwplwqpnsglaitedehu.supabase.co/storage/v1/object/public/images/logo%20192.png" />
    <link rel="apple-touch-icon" href="https://xdwplwqpnsglaitedehu.supabase.co/storage/v1/object/public/images/logo%20192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0C4A6E" />
  </head>
  <body>
    <script>
      // Global error handler for mobile debugging - must be before module scripts
      window.onerror = function(message, source, lineno, colno, error) {
        var errorDiv = document.createElement('div');
        errorDiv.style.position = 'fixed';
        errorDiv.style.top = '0';
        errorDiv.style.left = '0';
        errorDiv.style.width = '100%';
        errorDiv.style.height = '100%';
        errorDiv.style.backgroundColor = 'white';
        errorDiv.style.color = 'red';
        errorDiv.style.padding = '20px';
        errorDiv.style.zIndex = '9999';
        errorDiv.style.overflow = 'auto';
        errorDiv.innerHTML = '<h1>Erro de Inicialização</h1>' +
          '<p>Ocorreu um erro ao carregar o aplicativo. Por favor, tire um print desta tela e envie para o suporte.</p>' +
          '<pre>' + message + '\n' + source + ':' + lineno + ':' + colno + '\n' + (error ? error.stack : '') + '</pre>' +
          '<button onclick="location.reload()" style="padding: 10px 20px; background: #0C4A6E; color: white; border: none; border-radius: 5px; margin-top: 20px;">Recarregar</button>';
        document.body.appendChild(errorDiv);
        return false;
      };
      window.onunhandledrejection = function(event) {
        console.error('Unhandled rejection:', event.reason);
        // We don't necessarily want to show the full error overlay for every rejection,
        // but it's good to log it.
      };
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
